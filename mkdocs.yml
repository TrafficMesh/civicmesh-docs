site_name: CivicMesh Documentation
site_description: Distributed Traffic Enforcement & City Intelligence Platform
site_author: CivicMesh Team
site_url: https://civicmesh.org/docs
repo_url: https://github.com/TrafficMesh/civicmesh-docs
repo_name: civicmesh-docs
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo.png
  favicon: assets/favicon.png
  language: en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.arithmatex:
      block_start: $$
      block_end: $$
      inline_start: $
      inline_end: $
  - toc:
      permalink: true
      title: On this page
      toc_depth: "2-4"

plugins:
  - search:
      lang: en
      prebuild_index: true
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - awesome-pages:
      strict: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TrafficMesh
      name: GitHub
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/civicmesh
      name: Twitter
  version:
    provider: mike
    default: latest

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: "Copyright © 2026 CivicMesh. AGPL-3.0 & BSL-1.1 Licensed."

