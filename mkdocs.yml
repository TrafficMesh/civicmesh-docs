      - Project Registry: architecture/00_PROJECT_REGISTRY.md
      - Hardware Stack: architecture/01_HARDWARE_STACK.md
      - Violation Models: architecture/02_VIOLATION_MODELS.md
      - Digital Twin: architecture/03_DIGITAL_TWIN.md
      - Data Flow: architecture/04_DATA_FLOW.md
      - Business Model: architecture/05_BUSINESS_MODEL.md
      - Go-to-Market: architecture/06_GO_TO_MARKET.md
      - Sensor Fusion: architecture/07_SENSOR_FUSION.md
      - System Design: architecture/SYSTEM_DESIGN.md
  - Business:
      - Business Model: architecture/05_BUSINESS_MODEL.md
      - Go-to-Market Strategy: architecture/06_GO_TO_MARKET.md
      - Commercial Programs: business/
  - Deployment:
