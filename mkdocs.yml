      - Bill of Materials: hardware/NODE_BOM.md
      - Assembly: hardware/NODE_ASSEMBLY.md
      - QA Testing: hardware/QA_TESTING.md
      - BOM Details: hardware/bom/
  - API Reference:
      - Backend API: api/backend-api.md
      - API Specification: api/API_SPECIFICATION.md
      - Detailed Spec: api/API_SPECIFICATION_DETAILED.md
      - Data API: api/data-api.md
